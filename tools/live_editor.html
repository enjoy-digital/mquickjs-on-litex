<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mquickjs on LiteX - Live Editor</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#020406;color:#e8edf2;font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:16px 18px 12px;border-bottom:1px solid #075b82}
strong{display:block;font:700 24px/1.05 system-ui,sans-serif;color:#f7f9fb}strong b{color:#12bdf2}small{display:block;margin-top:5px;color:#12bdf2;text-transform:uppercase}
.badge{border:1px solid #0b87bd;color:#12bdf2;border-radius:4px;padding:6px 9px}
main{display:grid;grid-template-columns:280px minmax(0,1fr);gap:12px;min-height:calc(100vh - 67px);padding:12px}
nav{display:flex;flex-direction:column;gap:10px}
.panel,section{background:#06080b;border:1px solid #30343a;border-radius:4px;box-shadow:0 0 0 1px #05070a inset}
.title{display:flex;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid #10384d;color:#12bdf2;text-transform:uppercase}.title span:last-child{color:#8fa3b2}
.body{padding:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button,input,select{width:100%;height:34px;border:1px solid #30343a;border-radius:4px;background:#080c10;color:#dce8f2;padding:0 10px}
button{margin:0 0 8px;cursor:pointer;background:#0a0d11;border-color:#30343a;color:#c6d2dc;font:13px system-ui,sans-serif}
button:last-child,.row button{margin-bottom:0}
button.primary{background:#072234;border-color:#0b87bd;color:#e8f8ff}
button.tool{background:#061923;border-color:#12bdf2;color:#12bdf2}
label{display:block;margin:10px 0;color:#8fa3b2;text-transform:uppercase}
textarea{display:block;width:100%;height:100%;min-height:620px;padding:14px;background:#020406;color:#dce8f2;border:0;outline:0;font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;resize:vertical}
pre{margin:0;padding:12px;min-height:100px;background:#020406;border-top:1px solid #10384d;white-space:pre-wrap;overflow:auto;color:#dce8f2}
section{display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
@media(max-width:860px){main{grid-template-columns:1fr}textarea{min-height:430px}}
</style>
</head>
<body>
<header>
<div><strong>mquickjs <b>on LiteX</b></strong><small>browser to board</small></div>
<span class="badge">host editor</span>
</header>
<main>
<nav>
<div class="panel"><div class="title"><span>board</span><span>http</span></div><div class="body">
<label>Board URL<input id="board" value="http://192.168.1.50"></label>
<button class="tool" onclick="info()">Info</button>
</div></div>
<div class="panel"><div class="title"><span>runtime</span><span>control</span></div><div class="body">
<button class="primary" onclick="run()">Run</button>
<div class="row"><button onclick="control('pause')">Pause</button><button onclick="control('resume')">Resume</button></div>
<button onclick="control('stop')">Stop</button>
</div></div>
<div class="panel"><div class="title"><span>script</span><span>preset</span></div><div class="body">
<label>Preset<select id="preset" onchange="loadPreset(this.value)"></select></label>
<div class="row"><button onclick="share()">Share URL</button><button onclick="downloadJS()">Download JS</button></div>
</div></div>
<div class="panel"><div class="title"><span>sdcard</span><span>slots</span></div><div class="body">
<label>Slot<select id="slot"><option>main.js</option><option>demo1.js</option><option>demo2.js</option><option>demo3.js</option></select></label>
<div class="row"><button onclick="saveSlot()">Save Slot</button><button onclick="loadSlot()">Load Slot</button></div>
</div></div>
</nav>
<section>
<div class="title"><span>script.js</span><span>mquickjs</span></div>
<textarea id="code" spellcheck="false"></textarea>
<pre id="log">Ready.</pre>
</section>
</main>
<script>
const board=document.getElementById("board");
const code=document.getElementById("code");
const log=document.getElementById("log");
const preset=document.getElementById("preset");
const slot=document.getElementById("slot");
const helper=`var params={speed:32,scale:6,count:96,hue:0,overlay:1};
var demo={
  rgb:function(r,g,b){return ((r&255)<<16)|((g&255)<<8)|(b&255);},
  hue:function(h){h&=255;return demo.rgb((h*5)&255,(255-h)&255,(h*3)&255);},
  clear:function(c){if(framebuffer.width)framebuffer.clear(c);},
  led:function(n){litex.setLeds(1<<(n&3));},
  centerX:function(w){return ((framebuffer.width-w)/2)|0;},
  centerY:function(h){return ((framebuffer.height-h)/2)|0;},
  blitIndexed:function(idx,pal,w,h,s){framebuffer.blitIndexedScale(idx,pal,w,h,demo.centerX(w*s),demo.centerY(h*s),s);},
  controls:function(){var sw=litex.getSwitches(),btn=litex.getButtons();if(sw)params.hue=(sw*17)&255;if(btn&1)params.speed=64;if(btn&2)params.count=192;},
  overlay:function(name,t){if(!params.overlay||!framebuffer.width)return;var ww=framebuffer.width;framebuffer.fillRect(0,0,ww,26,0x020406);if(ww>16)framebuffer.fillRect(8,5,ww-16,16,0x06080b);framebuffer.line(0,25,ww-1,25,0x10384d);framebuffer.text(16,9,name+' '+((t/1000)|0)+'S',0x12bdf2,1);if(ww>220)framebuffer.text(ww-210,9,'SPD '+params.speed+' SW '+litex.getSwitches(),0x8fa3b2,1);},
  panel:function(x,y,pw,ph,title,tag){
    framebuffer.fillRect(x,y,pw,ph,0x06080b);
    framebuffer.line(x,y,x+pw-1,y,0x30343a);
    framebuffer.line(x,y+ph-1,x+pw-1,y+ph-1,0x30343a);
    framebuffer.line(x,y,x,y+ph-1,0x30343a);
    framebuffer.line(x+pw-1,y,x+pw-1,y+ph-1,0x30343a);
    framebuffer.line(x+1,y+28,x+pw-2,y+28,0x10384d);
    framebuffer.text(x+10,y+10,title,0x12bdf2,1);
    if(tag)framebuffer.text(x+pw-tag.length*6-10,y+10,tag,0x8fa3b2,1);
  },
  scriptPreview:function(status,lines){
    var w=framebuffer.width,h=framebuffer.height;
    if(!w||!h){console.log('[preview] no framebuffer');return;}
    framebuffer.clear(0x020406);
    if(w<560||h<420){framebuffer.text(8,10,'SCRIPT.JS',0xf7f9fb,1);framebuffer.text(8,30,status,0x12bdf2,1);return;}
    var m=24,gap=16,leftW=(((w-2*m-gap)*3)/5)|0;
    var rightX=m+leftW+gap,rightW=w-rightX-m,topY=92,panelH=h-228,bottomY=h-88;
    framebuffer.line(m,70,w-m,70,0x0b87bd);
    framebuffer.text(m,26,'MQUICKJS',0xf7f9fb,3);
    framebuffer.text(m+162,26,'ON LITEX',0x12bdf2,3);
    framebuffer.text(m+2,62,'LIVE JAVASCRIPT // FPGA VIDEO',0x12bdf2,1);
    framebuffer.fillRect(w-m-96,33,96,26,0x080c10);
    framebuffer.line(w-m-96,33,w-m-1,33,0x0b87bd);
    framebuffer.line(w-m-96,58,w-m-1,58,0x0b87bd);
    framebuffer.line(w-m-96,33,w-m-96,58,0x0b87bd);
    framebuffer.line(w-m-1,33,w-m-1,58,0x0b87bd);
    framebuffer.text(w-m-76,42,status,0x8ed94f,1);
    demo.panel(m,topY,leftW,panelH,'SCRIPT.JS','LOADED');
    framebuffer.fillRect(m+12,topY+42,leftW-24,panelH-54,0x020406);
    for(var i=0;i<lines.length&&i<7;i++){
      var y=topY+54+i*22,n=i+1;
      framebuffer.text(m+28,y,n<10?'0'+n:''+n,0x8fa3b2,1);
      framebuffer.text(m+58,y,lines[i],0xdce8f2,1);
    }
    demo.panel(rightX,topY,rightW,112,'BOARD','STATUS');
    framebuffer.text(rightX+12,topY+44,litex.getIdentifier(),0xdce8f2,1);
    framebuffer.text(rightX+12,topY+66,'FB '+w+'X'+h+'X'+framebuffer.depth,0x8fa3b2,1);
    framebuffer.text(rightX+12,topY+88,'ETH 192.168.1.50',0x8ed94f,1);
    demo.panel(rightX,topY+128,rightW,panelH-128,'RUNTIME','IDLE');
    framebuffer.text(rightX+12,topY+172,'BROWSER EDITOR',0xdce8f2,1);
    framebuffer.text(rightX+12,topY+194,'RUN TO EXECUTE',0x8fa3b2,1);
    framebuffer.text(rightX+12,topY+216,'JS EXECUTES HERE',0x12bdf2,1);
    demo.panel(m,bottomY,w-2*m,64,'CONSOLE','READY');
    framebuffer.text(m+14,bottomY+34,'OPEN HTTP://192.168.1.50/',0x8ed94f,1);
    framebuffer.text(m+14,bottomY+52,'SCRIPT.JS PREVIEW REFRESHED FROM WEB UI',0x8fa3b2,1);
    console.log('[preview] '+status+' - script.js shown on framebuffer');
  }
};
`;
const presets={
Splash:`// Splash screen for checking the dark/cyan live UI style.
function setup() {
  framebuffer.clear(0x020406);
  framebuffer.fillRect(38, 58, framebuffer.width - 76, framebuffer.height - 116, 0x06080b);
  framebuffer.line(38, 58, framebuffer.width - 39, 58, 0x30343a);
  framebuffer.line(38, 94, framebuffer.width - 39, 94, 0x10384d);
  framebuffer.text(56, 72, 'LIVE JS', 0x12bdf2, 1);
  framebuffer.text(72, 132, 'MQUICKJS', 0xf7f9fb, 4);
  framebuffer.text(72, 178, 'ON LITEX', 0x12bdf2, 4);
  framebuffer.text(76, 250, 'BROWSER TO FPGA VIDEO', 0x8ed94f, 2);
}

function frame(t) {
  var x = 76 + ((t / 8) % (framebuffer.width - 168));
  framebuffer.fillRect(72, 318, framebuffer.width - 144, 8, 0x080c10);
  framebuffer.fillRect(x, 318, 92, 8, 0x12bdf2);
  demo.overlay('SPLASH', t);
}`,
Plasma:`// Low-resolution indexed plasma, scaled by the C framebuffer helper.
var w = 80, h = 60;
var pixels, palette, start;

function setup() {
  start = litex.millis();
  pixels = new Uint8Array(w * h);
  palette = new Uint32Array(256);

  for (var i = 0; i < 256; i++) palette[i] = demo.hue(i);
}

function frame(t) {
  demo.controls();
  var phase = (((t - start) * params.speed) / 128) | 0;

  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      pixels[y*w+x] = ((x*x + y*y + x*phase + y*(phase >> 1)) >> 5) & 255;
    }
  }

  demo.blitIndexed(pixels, palette, w, h, params.scale);
  demo.overlay('PLASMA', t);
}`,
Vector:`// Vector-scope style lines with framebuffer fading trails.
var start = 0;

function setup() {
  start = litex.millis();
  demo.clear(0);
}

function frame(t) {
  demo.controls();
  var phase = (((t - start) * params.speed) / 128) | 0;
  var cx = framebuffer.width >> 1;
  var cy = framebuffer.height >> 1;

  framebuffer.fade(28);
  for (var i = 0; i < 20; i++) {
    var x = (i * 43 + phase * 7) % framebuffer.width;
    var y = (i * 29 + phase * 5) % framebuffer.height;
    framebuffer.line(cx, cy, x, y, demo.hue(params.hue + phase + i * 13));
  }

  framebuffer.circle(cx, cy, (phase % 90) + 20,
                     demo.hue(params.hue + phase), 0);
  demo.overlay('VECTOR', t);
}`,
Stars:`// Simple star field. Lower z means closer to the viewer.
var starX = [], starY = [], starZ = [];

function setup() {
  for (var i = 0; i < 256; i++) {
    starX[i] = (i * 37) % 640 - 320;
    starY[i] = (i * 71) % 480 - 240;
    starZ[i] = (i % 64) + 1;
  }
  demo.clear(0);
}

function frame(t) {
  demo.controls();
  framebuffer.fade(36);

  for (var i = 0; i < params.count; i++) {
    starZ[i] -= params.speed / 24;
    if (starZ[i] < 1) starZ[i] = 64;

    var x = (framebuffer.width  / 2 + (starX[i] * 48) / starZ[i]) | 0;
    var y = (framebuffer.height / 2 + (starY[i] * 48) / starZ[i]) | 0;
    framebuffer.fillRect(x, y, 2, 2, demo.hue(params.hue + starZ[i] * 4));
  }

  demo.overlay('STARS', t);
}`,
Logo:`// Bouncing text badge, useful to check text/circle helpers.
var start = 0;

function setup() {
  start = litex.millis();
}

function frame(t) {
  demo.controls();
  var phase = (((t - start) * params.speed) / 180) | 0;
  var x = (phase * 5) % (framebuffer.width - 240);
  var y = (phase * 3) % (framebuffer.height - 80);

  demo.clear(0x020406);
  framebuffer.fillRect(x, y, 238, 78, 0x06080b);
  framebuffer.line(x, y, x + 237, y, 0x30343a);
  framebuffer.line(x, y + 77, x + 237, y + 77, 0x30343a);
  framebuffer.line(x, y, x, y + 77, 0x30343a);
  framebuffer.line(x + 237, y, x + 237, y + 77, 0x30343a);
  framebuffer.line(x + 1, y + 24, x + 236, y + 24, 0x10384d);
  framebuffer.text(x + 10, y + 9, 'LIVE JS', 0x12bdf2, 1);
  framebuffer.text(x + 24, y + 34, 'MQUICKJS', 0xf7f9fb, 2);
  framebuffer.text(x + 132, y + 34, 'ON LITEX', 0x12bdf2, 2);
  demo.overlay('LOGO', t);
}`
};
for(const name of Object.keys(presets)){const opt=document.createElement("option");opt.textContent=name;preset.appendChild(opt);}
function url(path){return board.value.replace(/\/$/,"")+path;}
function setLog(text){log.textContent=text;}
async function post(path,body){const r=await fetch(url(path),{method:"POST",headers:{"Content-Type":"text/plain"},body});const t=await r.text();setLog(t);return {ok:r.ok,text:t};}
async function run(){setLog("Sending...");await post("/run",helper+code.value);}
function cleanLine(line){const allowed="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .:/-><=_+*()[]{};,!?&|";let out="";line=line.toUpperCase();for(let i=0;i<line.length&&out.length<44;i++){const c=line[i];out+=allowed.indexOf(c)>=0?c:" ";}return out.replace(/  +/g," ");}
function previewScript(status){const lines=[];for(const raw of code.value.split(/\r?\n/)){const s=cleanLine(raw);if(s)lines.push(s);if(lines.length===7)break;}if(!lines.length)lines.push("EMPTY SCRIPT");if(status.length>12)status=status.slice(0,12);return helper+"demo.scriptPreview("+JSON.stringify(status)+","+JSON.stringify(lines)+");\n";}
async function preview(status,prefix=""){setLog("Refreshing framebuffer...");const r=await post("/run",previewScript(status));if(prefix)setLog(prefix+r.text);return r;}
async function control(cmd){const r=await post("/control",cmd);if(r.ok&&(cmd==="stop"||cmd==="reset"))await preview(cmd.toUpperCase(),r.text);}
async function info(){const r=await fetch(url("/info"));setLog(JSON.stringify(await r.json(),null,2));}
async function saveSlot(){await post("/save?name="+encodeURIComponent(slot.value),helper+code.value);}
async function loadSlot(){const r=await fetch(url("/load?name="+encodeURIComponent(slot.value)));const t=await r.text();if(r.ok){code.value=t;await preview("LOADED "+slot.value,"Loaded "+slot.value+"\n");}else setLog(t);}
function loadPreset(name){code.value=presets[name];preview("LOADED "+name.toUpperCase());}
function share(){location.hash=btoa(unescape(encodeURIComponent(code.value)));navigator.clipboard&&navigator.clipboard.writeText(location.href);setLog("Share URL updated.");}
function downloadJS(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([code.value],{type:"text/javascript"}));a.download="demo.js";a.click();}
if(location.hash.length>1){try{code.value=decodeURIComponent(escape(atob(location.hash.slice(1))));}catch(e){code.value=presets.Plasma;}}else code.value=presets.Plasma;
</script>
</body>
</html>
