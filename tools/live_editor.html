<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mquickjs on LiteX - Live Editor</title>
<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #020406;
    color: #e8edf2;
    font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px 12px;
    border-bottom: 1px solid #075b82;
}

strong {
    display: block;
    color: #f7f9fb;
    font: 700 24px/1.05 system-ui, sans-serif;
}

strong b,
small {
    color: #12bdf2;
}

small {
    display: block;
    margin-top: 5px;
    text-transform: uppercase;
}

main {
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 12px;
    min-height: calc(100vh - 67px);
    padding: 12px;
}

nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

section,
.panel {
    background: #06080b;
    border: 1px solid #30343a;
    border-radius: 4px;
    box-shadow: 0 0 0 1px #05070a inset;
}

section {
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
}

.title {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid #10384d;
    color: #12bdf2;
    text-transform: uppercase;
}

.title span:last-child {
    color: #8fa3b2;
}

.body {
    padding: 10px;
}

.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.badge {
    padding: 6px 9px;
    border: 1px solid #0b87bd;
    border-radius: 4px;
    color: #12bdf2;
}

label {
    display: block;
    margin: 10px 0;
    color: #8fa3b2;
    text-transform: uppercase;
}

button,
input,
select {
    width: 100%;
    height: 34px;
    padding: 0 10px;
    background: #080c10;
    border: 1px solid #30343a;
    border-radius: 4px;
    color: #dce8f2;
}

button {
    margin: 0 0 8px;
    background: #0a0d11;
    border-color: #30343a;
    color: #c6d2dc;
    cursor: pointer;
    font: 13px system-ui, sans-serif;
}

button:last-child,
.row button {
    margin-bottom: 0;
}

button.primary {
    background: #072234;
    border-color: #0b87bd;
    color: #e8f8ff;
}

button.tool {
    background: #061923;
    border-color: #12bdf2;
    color: #12bdf2;
}

textarea {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 620px;
    padding: 14px;
    resize: vertical;
    background: #020406;
    border: 0;
    outline: 0;
    color: #dce8f2;
    font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
}

pre {
    min-height: 100px;
    margin: 0;
    padding: 12px;
    overflow: auto;
    background: #020406;
    border-top: 1px solid #10384d;
    color: #dce8f2;
    white-space: pre-wrap;
}

@media(max-width: 860px) {
    main {
        grid-template-columns: 1fr;
    }

    textarea {
        min-height: 430px;
    }
}
</style>
</head>
<body>
<header>
<div>
<strong>mquickjs <b>on LiteX</b></strong>
<small>browser to board</small>
</div>
<span class="badge">host editor</span>
</header>

<main>
<nav>
<div class="panel">
<div class="title"><span>board</span><span>http</span></div>
<div class="body">
<label>Board URL<input id="board" value="http://192.168.1.50"></label>
<button class="tool" onclick="info()">Info</button>
</div>
</div>

<div class="panel">
<div class="title"><span>runtime</span><span>control</span></div>
<div class="body">
<button class="primary" onclick="run()">Run</button>
<div class="row">
<button onclick="control('pause')">Pause</button>
<button onclick="control('resume')">Resume</button>
</div>
<button onclick="control('stop')">Stop</button>
</div>
</div>

<div class="panel">
<div class="title"><span>script</span><span>preset</span></div>
<div class="body">
<label>Preset<select id="preset" onchange="loadPreset(this.value)"></select></label>
<div class="row">
<button onclick="share()">Share URL</button>
<button onclick="downloadJS()">Download JS</button>
</div>
</div>
</div>

<div class="panel">
<div class="title"><span>sdcard</span><span>slots</span></div>
<div class="body">
<label>
Slot
<select id="slot">
<option>main.js</option>
<option>demo1.js</option>
<option>demo2.js</option>
<option>demo3.js</option>
</select>
</label>
<div class="row">
<button onclick="saveSlot()">Save Slot</button>
<button onclick="loadSlot()">Load Slot</button>
</div>
</div>
</div>
</nav>

<section>
<div class="title"><span>script.js</span><span>mquickjs</span></div>
<textarea id="code" spellcheck="false"></textarea>
<pre id="log">Ready.</pre>
</section>
</main>

<script src="live_assets.js"></script>
<script>
"use strict";

const board  = document.getElementById("board");
const code   = document.getElementById("code");
const log    = document.getElementById("log");
const preset = document.getElementById("preset");
const slot   = document.getElementById("slot");

const helper = LiveDemo.helper;
const defaultScript = LiveDemo.defaultScript;
const presets = LiveDemo.presets;

for (const name of Object.keys(presets)) {
    const option = document.createElement("option");

    option.value = name;
    option.textContent = name[0].toUpperCase() + name.slice(1);
    preset.appendChild(option);
}

function url(path) {
    return board.value.replace(/\/$/, "") + path;
}

function setLog(text) {
    log.textContent = text;
}

async function post(path, body) {
    const response = await fetch(url(path), {
        method: "POST",
        headers: {"Content-Type": "text/plain"},
        body: body,
    });
    const text = await response.text();

    setLog(text);
    return {ok: response.ok, text: text};
}

async function run() {
    setLog("Sending...");
    await post("/run", helper + code.value);
}

function cleanLine(line) {
    const allowed = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 .:/-><=_+*()[]{};,!?&|";
    let out = "";

    line = line.toUpperCase();
    for (let i = 0; i < line.length && out.length < 44; i++) {
        const c = line[i];
        out += allowed.indexOf(c) >= 0 ? c : " ";
    }
    return out.replace(/  +/g, " ");
}

function previewScript(status) {
    const lines = [];

    for (const raw of code.value.split(/\r?\n/)) {
        const line = cleanLine(raw);
        if (line) lines.push(line);
        if (lines.length === 7) break;
    }
    if (!lines.length) lines.push("EMPTY SCRIPT");
    if (status.length > 12) status = status.slice(0, 12);

    return helper + "demo.scriptPreview(" +
        JSON.stringify(status) + ", " + JSON.stringify(lines) + ");\n";
}

async function preview(status, prefix) {
    setLog("Refreshing framebuffer...");
    const result = await post("/run", previewScript(status));

    if (prefix) setLog(prefix + result.text);
    return result;
}

async function control(cmd) {
    const result = await post("/control", cmd);

    if (result.ok && (cmd === "stop" || cmd === "reset")) {
        await preview(cmd.toUpperCase(), result.text);
    }
}

async function info() {
    const response = await fetch(url("/info"));
    setLog(JSON.stringify(await response.json(), null, 2));
}

async function saveSlot() {
    await post("/save?name=" + encodeURIComponent(slot.value), helper + code.value);
}

async function loadSlot() {
    const response = await fetch(url("/load?name=" + encodeURIComponent(slot.value)));
    const text = await response.text();

    if (!response.ok) {
        setLog(text);
        return;
    }

    code.value = text;
    await preview("LOADED " + slot.value, "Loaded " + slot.value + "\n");
}

function loadPreset(name) {
    code.value = presets[name];
    preview("LOADED " + name.toUpperCase());
}

function share() {
    location.hash = btoa(unescape(encodeURIComponent(code.value)));
    if (navigator.clipboard) navigator.clipboard.writeText(location.href);
    setLog("Share URL updated.");
}

function downloadJS() {
    const blob = new Blob([code.value], {type: "text/javascript"});
    const anchor = document.createElement("a");

    anchor.href = URL.createObjectURL(blob);
    anchor.download = "demo.js";
    anchor.click();
}

if (location.hash.length > 1) {
    try {
        code.value = decodeURIComponent(escape(atob(location.hash.slice(1))));
    } catch (e) {
        code.value = presets.plasma;
    }
} else {
    code.value = presets.plasma;
}
</script>
</body>
</html>
