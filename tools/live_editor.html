<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>mquickjs on LiteX - Live Editor</title>
<style>
body{margin:0;background:#080b10;color:#d6deeb;font:14px/1.4 system-ui,sans-serif}
header{display:flex;gap:12px;align-items:center;padding:12px 16px;background:#111820;border-bottom:1px solid #30363d}
main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 50px)}
nav{padding:14px;border-right:1px solid #30363d}
button,input,select{box-sizing:border-box;border:1px solid #30363d;border-radius:6px;background:#111820;color:#d6deeb;padding:8px}
button{width:100%;margin:0 0 8px;cursor:pointer}
button.primary{background:#238636;border-color:#238636;color:white}
button.tool{background:#1f6feb;border-color:#1f6feb;color:white}
label{display:block;margin:10px 0;color:#8b949e}
input,select{width:100%}
textarea{box-sizing:border-box;width:100%;height:100%;min-height:620px;padding:14px;background:#070b10;color:#d6deeb;border:0;outline:0;font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
pre{margin:0;padding:12px;min-height:80px;background:#0d1117;border-top:1px solid #30363d;white-space:pre-wrap}
section{display:grid;grid-template-rows:1fr auto}
</style>
</head>
<body>
<header>
<strong>mquickjs on LiteX</strong>
<span>Live JavaScript editor</span>
</header>
<main>
<nav>
<label>Board URL<input id="board" value="http://192.168.1.50"></label>
<button class="primary" onclick="run()">Run</button>
<button onclick="control('pause')">Pause</button>
<button onclick="control('resume')">Resume</button>
<button onclick="control('stop')">Stop</button>
<button class="tool" onclick="info()">Info</button>
<label>Preset<select id="preset" onchange="loadPreset(this.value)"></select></label>
<label>Slot<select id="slot"><option>main.js</option><option>demo1.js</option><option>demo2.js</option><option>demo3.js</option></select></label>
<button onclick="saveSlot()">Save Slot</button>
<button onclick="loadSlot()">Load Slot</button>
<button onclick="share()">Share URL</button>
<button onclick="downloadJS()">Download JS</button>
</nav>
<section>
<textarea id="code" spellcheck="false"></textarea>
<pre id="log">Ready.</pre>
</section>
</main>
<script>
const board=document.getElementById("board");
const code=document.getElementById("code");
const log=document.getElementById("log");
const preset=document.getElementById("preset");
const slot=document.getElementById("slot");
const helper=`var params={speed:32,scale:6,count:96,hue:0,overlay:1};
var demo={
  rgb:function(r,g,b){return ((r&255)<<16)|((g&255)<<8)|(b&255);},
  hue:function(h){h&=255;return demo.rgb((h*5)&255,(255-h)&255,(h*3)&255);},
  clear:function(c){if(framebuffer.width)framebuffer.clear(c);},
  led:function(n){litex.setLeds(1<<(n&3));},
  centerX:function(w){return ((framebuffer.width-w)/2)|0;},
  centerY:function(h){return ((framebuffer.height-h)/2)|0;},
  blitIndexed:function(idx,pal,w,h,s){framebuffer.blitIndexedScale(idx,pal,w,h,demo.centerX(w*s),demo.centerY(h*s),s);},
  controls:function(){var sw=litex.getSwitches(),btn=litex.getButtons();if(sw)params.hue=(sw*17)&255;if(btn&1)params.speed=64;if(btn&2)params.count=192;},
  overlay:function(name,t){if(!params.overlay||!framebuffer.width)return;framebuffer.fillRect(0,0,framebuffer.width,18,0x05070a);framebuffer.text(8,5,name+' '+((t/1000)|0)+'S',0xffffff,1);}
};
`;
const presets={
Splash:`function setup(){framebuffer.clear(0x05070a);framebuffer.text(64,90,'MQUICKJS',0xffffff,5);framebuffer.text(94,150,'ON LITEX',0xffc857,4);framebuffer.text(92,230,'LIVE FROM BROWSER',0x33dd88,2);}
function frame(t){framebuffer.circle((t/8)%framebuffer.width,340,42,demo.hue(t/16),0);demo.overlay('SPLASH',t);}`,
Plasma:`var w=80,h=60,idx,pal,t0=0;
function setup(){t0=litex.millis();idx=new Uint8Array(w*h);pal=new Uint32Array(256);for(var i=0;i<256;i++)pal[i]=demo.hue(i);}
function frame(t){demo.controls();var p=(((t-t0)*params.speed)/128)|0;for(var y=0;y<h;y++)for(var x=0;x<w;x++)idx[y*w+x]=((x*x+y*y+x*p+y*(p>>1))>>5)&255;demo.blitIndexed(idx,pal,w,h,params.scale);demo.overlay('PLASMA',t);}`,
Vector:`var t0=0;function setup(){t0=litex.millis();demo.clear(0);}
function frame(t){demo.controls();var p=(((t-t0)*params.speed)/128)|0,cx=framebuffer.width>>1,cy=framebuffer.height>>1;framebuffer.fade(28);for(var i=0;i<20;i++){var x=(i*43+p*7)%framebuffer.width,y=(i*29+p*5)%framebuffer.height;framebuffer.line(cx,cy,x,y,demo.hue(params.hue+p+i*13));}framebuffer.circle(cx,cy,(p%90)+20,demo.hue(params.hue+p),0);demo.overlay('VECTOR',t);}`,
Stars:`var sx=[],sy=[],sz=[];function setup(){for(var i=0;i<256;i++){sx[i]=(i*37)%640-320;sy[i]=(i*71)%480-240;sz[i]=(i%64)+1;}demo.clear(0);}
function frame(t){demo.controls();framebuffer.fade(36);for(var i=0;i<params.count;i++){sz[i]-=params.speed/24;if(sz[i]<1)sz[i]=64;var x=(framebuffer.width/2+(sx[i]*48)/sz[i])|0,y=(framebuffer.height/2+(sy[i]*48)/sz[i])|0;framebuffer.fillRect(x,y,2,2,demo.hue(params.hue+sz[i]*4));}demo.overlay('STARS',t);}`,
Logo:`var t0=0;function setup(){t0=litex.millis();}
function frame(t){demo.controls();var p=(((t-t0)*params.speed)/180)|0;demo.clear(0x05070a);var x=(p*5)%(framebuffer.width-240),y=(p*3)%(framebuffer.height-80);framebuffer.circle(x+120,y+42,48,demo.hue(params.hue+p),1);framebuffer.text(x,y+18,'MQUICKJS',0xffffff,3);framebuffer.text(x+22,y+48,'ON LITEX',0xffc857,2);demo.overlay('LOGO',t);}`
};
for(const name of Object.keys(presets)){const opt=document.createElement("option");opt.textContent=name;preset.appendChild(opt);}
function url(path){return board.value.replace(/\/$/,"")+path;}
function setLog(text){log.textContent=text;}
async function post(path,body){const r=await fetch(url(path),{method:"POST",headers:{"Content-Type":"text/plain"},body});const t=await r.text();setLog(t);return {ok:r.ok,text:t};}
async function run(){setLog("Sending...");await post("/run",helper+code.value);}
async function control(cmd){await post("/control",cmd);}
async function info(){const r=await fetch(url("/info"));setLog(JSON.stringify(await r.json(),null,2));}
async function saveSlot(){await post("/save?name="+encodeURIComponent(slot.value),helper+code.value);}
async function loadSlot(){const r=await fetch(url("/load?name="+encodeURIComponent(slot.value)));const t=await r.text();if(r.ok){code.value=t;setLog("Loaded "+slot.value);}else setLog(t);}
function loadPreset(name){code.value=presets[name];}
function share(){location.hash=btoa(unescape(encodeURIComponent(code.value)));navigator.clipboard&&navigator.clipboard.writeText(location.href);setLog("Share URL updated.");}
function downloadJS(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([code.value],{type:"text/javascript"}));a.download="demo.js";a.click();}
if(location.hash.length>1){try{code.value=decodeURIComponent(escape(atob(location.hash.slice(1))));}catch(e){loadPreset("Plasma");}}else loadPreset("Plasma");
</script>
</body>
</html>
